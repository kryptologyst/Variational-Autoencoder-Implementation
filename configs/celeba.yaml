# Model configuration for CelebA
model:
  type: "conv_vae"
  params:
    input_channels: 3
    hidden_channels: [64, 128, 256, 512]
    latent_dim: 128
    beta: 1.0
    image_size: 64

# Training configuration
training:
  max_epochs: 200
  learning_rate: 1e-3
  weight_decay: 1e-5
  batch_size: 64
  num_workers: 4
  
  # KL annealing
  beta_start: 0.0
  beta_end: 1.0
  beta_schedule: "linear"
  warmup_epochs: 20
  
  # Optimization
  grad_clip: 1.0
  scheduler:
    type: "cosine"
    eta_min: 1e-6
  
  # Checkpointing
  save_every_n_epochs: 10
  save_top_k: 3
  monitor: "val/total_loss"
  mode: "min"

# Data configuration
data:
  dataset: "celeba"
  data_dir: "./data"
  image_size: 64
  augment: true
  val_split: 0.1
  test_split: 0.1
  normalize: true

# Evaluation configuration
evaluation:
  num_samples: 1000
  compute_fid: true
  num_interpolation_pairs: 10
  num_interpolation_steps: 10
  latent_dims_to_traverse: [0, 1, 2, 3, 4, 5]

# Logging configuration
logging:
  log_every_n_steps: 50
  log_images_every_n_epochs: 5
  
  wandb:
    project: "vae-implementation"
    tags: ["vae", "celeba", "faces", "generative-models"]

# Device configuration
device:
  auto: true

# Reproducibility
seed: 42
deterministic: true

# Paths
paths:
  data_dir: "./data"
  checkpoints_dir: "./checkpoints"
  logs_dir: "./logs"
  assets_dir: "./assets"
  results_dir: "./results"

# Sampling configuration
sampling:
  num_samples: 64
  batch_size: 100

# Visualization configuration
visualization:
  save_dir: "./assets/visualizations"
  dpi: 150
  figsize: [12, 12]
